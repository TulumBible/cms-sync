name: CI

# Type-check on every PR and on pushes that touch code — the sync
# workflow itself only runs on cron/dispatch, so without this nothing
# validates a change before it lands on main.
on:
  pull_request:
  push:
    branches: [main, draft]
    paths:
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      # Same SHA pins as sync.yml — keep the two files in step when bumping.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm type-check

      - name: Test
        run: pnpm test
