name: Sync Convex → JSON

on:
  schedule:
    # Daily at 07:00 UTC — the backstop. Fast propagation comes from
    # events-management firing a workflow_dispatch at this workflow on
    # every publish/unpublish (see convex/publish/actions.ts there), so
    # the cron only matters when that trigger is unconfigured or fails.
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      citySlug:
        description: 'Optional city slug to sync only that city (e.g. "tulum"). Empty = sync every active city in the Convex registry.'
        required: false
        type: string
      includeDrafts:
        description: 'Fetch draft-branch mode (?drafts=1) — live projection with isDraft flags. Leave unchecked for main branch (published only).'
        required: false
        type: boolean
        default: false
      allowShrink:
        description: 'Bypass the mass-deletion guard (collection wiped or shrunk >80%). Check ONLY when a large content removal is intentional.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: cms-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # Draft mode commits unpublished content to whatever branch this
      # runs on — and this repo is PUBLIC. Refuse includeDrafts anywhere
      # except the draft branch so a mis-clicked dispatch can't ship
      # draft data to main (and from there to production consumers).
      - name: Guard draft-mode dispatch
        if: inputs.includeDrafts && github.ref != 'refs/heads/draft'
        run: |
          echo "::error::includeDrafts=true is only allowed on the draft branch (got $GITHUB_REF). Draft content must never land on main."
          exit 1

      # Actions pinned to commit SHAs — these jobs hold INTERNAL_CMS_KEY
      # and ASTRO_DISPATCH_TOKEN; a repointed floating tag would run
      # attacker code with those in reach.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run sync
        env:
          # Convex deployment that emits /cms-snapshot/* endpoints.
          # Use the .convex.site host (HTTP actions), NOT .convex.cloud.
          CONVEX_SITE_URL: ${{ secrets.CONVEX_SITE_URL }}
          # Shared secret — must match Convex's INTERNAL_CMS_KEY env
          # var. Rotate both sides together.
          INTERNAL_CMS_KEY: ${{ secrets.INTERNAL_CMS_KEY }}
          # When set, sync.ts only syncs this city and skips the rest.
          # Cron runs leave this unset → all cities.
          SYNC_ONLY_CITY: ${{ inputs.citySlug }}
          # When "1", publishable routes are fetched with ?drafts=1 so
          # the output reflects live editor state instead of frozen
          # published snapshots. Used on the `draft` branch of this
          # repo by a separate workflow (or manual dispatch).
          SYNC_INCLUDE_DRAFTS: ${{ inputs.includeDrafts && '1' || '' }}
          # When "1", bypasses the mass-deletion guard for runs where
          # a large removal is known to be intentional.
          SYNC_ALLOW_SHRINK: ${{ inputs.allowShrink && '1' || '' }}
        run: pnpm sync

      - name: Commit changes
        id: commit
        env:
          # Never interpolate ${{ inputs.* }} into the script body —
          # classic Actions script injection. Env-pass instead.
          CITY_SLUG_INPUT: ${{ inputs.citySlug }}
          # The push-race retry below re-runs `pnpm sync`, which needs
          # the same env as the Run sync step.
          CONVEX_SITE_URL: ${{ secrets.CONVEX_SITE_URL }}
          INTERNAL_CMS_KEY: ${{ secrets.INTERNAL_CMS_KEY }}
          SYNC_ONLY_CITY: ${{ inputs.citySlug }}
          SYNC_INCLUDE_DRAFTS: ${{ inputs.includeDrafts && '1' || '' }}
          SYNC_ALLOW_SHRINK: ${{ inputs.allowShrink && '1' || '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          commit_data() {
            git add data/
            if git diff --staged --quiet; then return 1; fi

            # Subject summarises what changed per city, e.g.
            #   chore: sync tulum (venues, events); cabos (faqs)
            # Falls back to counts when the list is too long (a new
            # city's first sync touches every collection). Full file
            # list goes in the body either way.
            CHANGED_FILES=$(git diff --staged --name-only -- data/)
            SUMMARY=$(echo "$CHANGED_FILES" | awk -F/ '
              NF >= 3 { c = $2; f = $3; sub(/\.json$/, "", f)
                        cols[c] = cols[c] (cols[c] ? ", " : "") f }
              NF == 2 { reg = 1 }
              END {
                out = ""
                for (c in cols) out = out (out ? "; " : "") c " (" cols[c] ")"
                if (reg) out = out (out ? "; " : "") "city registry"
                print out
              }')
            if [ ${#SUMMARY} -gt 100 ]; then
              NFILES=$(echo "$CHANGED_FILES" | wc -l | tr -d " ")
              NCITIES=$(echo "$CHANGED_FILES" | awk -F/ 'NF>=3 {print $2}' | sort -u | wc -l | tr -d " ")
              SUMMARY="$NFILES files across $NCITIES cities"
            fi
            COMMIT_MSG="chore: sync ${SUMMARY:-data} ($(date -u +%Y-%m-%dT%H:%MZ))"
            git commit -m "$COMMIT_MSG" -m "$CHANGED_FILES"
          }

          if ! commit_data; then
            echo "No changes to commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git push; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Push race: another run landed first (GitHub's concurrency
          # check races when two dispatches arrive seconds apart —
          # observed 2026-06-10). Merging stale local files (the old
          # `-X theirs` rebase) could clobber the other run's snapshot
          # for cities it fetched later. Don't merge at all: reset onto
          # the winner and RE-RUN the sync — regenerated output on top
          # of the new base is fresh for every city by construction.
          echo "Push rejected — re-syncing on top of the other run's commit."
          git fetch origin main
          git reset --hard origin/main
          pnpm sync
          if commit_data; then
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Re-sync produced no delta over the other run's commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

      # Kick the Astro site's build workflow (deploy.yml in
      # TulumBible/tulum-bible-astro) so a data commit actually reaches
      # the deployed site without waiting for that repo's next push or
      # its daily cron. The Pages project is direct-upload — GitHub
      # Actions is the build host, so the "deploy hook" is a
      # repository_dispatch. Only fires when data changed; silently
      # skipped until the ASTRO_DISPATCH_TOKEN secret is configured
      # (fine-grained PAT: repo tulum-bible-astro, Contents read+write).
      - name: Trigger Astro rebuild
        if: steps.commit.outputs.pushed == 'true'
        env:
          DISPATCH_TOKEN: ${{ secrets.ASTRO_DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "ASTRO_DISPATCH_TOKEN secret not set; skipping rebuild trigger."
            exit 0
          fi
          curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/TulumBible/tulum-bible-astro/dispatches \
            -d '{"event_type":"content-updated"}' \
            || echo "Dispatch failed (non-fatal) — data is committed; the Astro daily cron will pick it up."

      # Report status back to Convex so the admin UI can show a green
      # dot + "synced X ago" with the commit SHA. Runs regardless of
      # whether this run succeeded — on failure, we report the error
      # so the admin UI can show red. `always()` ensures this step runs
      # even after a failed earlier step.
      - name: Report status to Convex
        if: always()
        env:
          CONVEX_SITE_URL: ${{ secrets.CONVEX_SITE_URL }}
          INTERNAL_CMS_KEY: ${{ secrets.INTERNAL_CMS_KEY }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "$CONVEX_SITE_URL" ] || [ -z "$INTERNAL_CMS_KEY" ]; then
            echo "Convex env vars missing; skipping status report."
            exit 0
          fi
          SHA=$(git rev-parse HEAD)
          if [ "$JOB_STATUS" = "success" ]; then
            BODY=$(printf '{"platform":"cmsSync","lastCommitSha":"%s","syncError":null}' "$SHA")
          else
            BODY=$(printf '{"platform":"cmsSync","lastCommitSha":"%s","syncError":"Sync job exited with status: %s. See GitHub Actions logs for details."}' "$SHA" "$JOB_STATUS")
          fi
          curl -sS --fail-with-body \
            -X POST \
            -H "x-internal-cms-key: $INTERNAL_CMS_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "$CONVEX_SITE_URL/api/platform-status" \
            || echo "Status report failed (non-fatal) — sync itself still succeeded/failed per job.status above."
